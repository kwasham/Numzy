services:
  numzy_api:
    build: .
    command: sh -c "python -c 'import asyncio; from app.core.database import init_db; asyncio.run(init_db())' && uvicorn app.api.main:app --host 0.0.0.0 --port 8001 --reload"
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8010:8001"
    env_file:
      - .env
    environment:
      - DEV_AUTH_BYPASS=true
      - DRAMATIQ_BROKER_URL=redis://redis:6379/0
    depends_on:
      mcp_server:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started

  mcp_server:
    build:
      context: .
    command: python app/mcp/prompt_server.py
    ports:
      - "8000:8000"
    environment:
      - DEV_AUTH_BYPASS=true

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  dramatiq_worker:
    build: .
    command: sh -c "sleep 10 && dramatiq app.core.tasks --processes 1 --threads 4"
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DRAMATIQ_BROKER_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - DEV_AUTH_BYPASS=true
    depends_on:
      numzy_api:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started

volumes:
  minio_data:
